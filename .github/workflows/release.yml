name: Build Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: odon-linux-x86_64
            artifact_path: target/release/bundle/linux/odon-linux-x86_64.tar.gz
          - os: macos-latest
            artifact_name: odon-macos
            artifact_path: target/release/bundle/osx/odon-macos.zip
          - os: windows-latest
            artifact_name: odon-windows-x86_64
            artifact_path: target/release/bundle/windows/odon-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgtk-3-dev \
            libudev-dev \
            libxdo-dev

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux artifact
        if: runner.os == 'Linux'
        run: ./scripts/package-linux.sh

      - name: Build macOS app bundle
        if: runner.os == 'macOS'
        run: |
          ./scripts/build-app.sh --release
          cd target/release/bundle/osx
          ditto -c -k --sequesterRsrc --keepParent odon.app odon-macos.zip

      - name: Build Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
