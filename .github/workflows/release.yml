name: Build Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - "test/installers-mcp-packaging"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: odon-linux-x86_64
            artifact_path: |
              target/release/bundle/linux/odon-linux-x86_64.tar.gz
              target/release/bundle/linux/odon_*_amd64.deb
          - os: macos-latest
            artifact_name: odon-macos
            artifact_path: |
              target/release/bundle/osx/odon-macos.zip
              target/release/bundle/osx/odon-macos.dmg
          - os: windows-latest
            artifact_name: odon-windows-x86_64
            artifact_path: |
              target/release/bundle/windows/odon-windows-x86_64.zip
              target/release/bundle/windows/installer/OdonSetup-*-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgtk-3-dev \
            libudev-dev \
            libxdo-dev \
            desktop-file-utils \
            dpkg-dev

      - name: Install Windows installer dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup -y

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux artifacts
        if: runner.os == 'Linux'
        run: |
          ./scripts/package-linux.sh
          ./scripts/package-linux-deb.sh

      - name: Build macOS artifacts
        if: runner.os == 'macOS'
        run: |
          ./scripts/package-macos-dmg.sh --release
          cd target/release/bundle/osx
          ditto -c -k --sequesterRsrc --keepParent odon.app odon-macos.zip

      - name: Build Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/odon-linux-x86_64.tar.gz
            release-assets/odon_*_amd64.deb
            release-assets/odon-macos.dmg
            release-assets/odon-macos.zip
            release-assets/OdonSetup-*-windows-x86_64.exe
            release-assets/odon-windows-x86_64.zip
